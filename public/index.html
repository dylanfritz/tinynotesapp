<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
    #sidebar { width: 200px; background: #f3f3f3; padding: 10px; overflow-y: auto; }
    #editor { flex: 1; padding: 20px; }
    .note { padding: 5px; cursor: pointer; }
    .note:hover { background: #ddd; }
    #add { font-size: 24px; cursor: pointer; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="add">+</div>
    <div id="notes"></div>
  </div>
  <textarea id="editor" placeholder="Select or create a note"></textarea>

  <script>
    let current = null;

    async function loadNotes() {
      const res = await fetch("/notes");
      const notes = await res.json();
      const list = document.getElementById("notes");
      list.innerHTML = "";
      notes.forEach(n => {
        const div = document.createElement("div");
        div.className = "note";
        div.textContent = n.text.slice(0, 20) || "(empty)";
        div.onclick = () => selectNote(n);
        list.appendChild(div);
      });
    }

    async function selectNote(n) {
      current = n;
      document.getElementById("editor").value = n.text;
    }

    document.getElementById("add").onclick = async () => {
      const res = await fetch("/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: "" })
      });
      current = await res.json();
      loadNotes();
      document.getElementById("editor").value = "";
    };

    document.getElementById("editor").oninput = async (e) => {
      if (!current) return;
      current.text = e.target.value;
      await fetch("/notes/" + current.id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: current.text })
      });
      loadNotes();
    };

    loadNotes();
  </script>
</body>
</html>
